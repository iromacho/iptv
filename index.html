<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV España</title>

<style>
:root{
  color-scheme:dark;
  --bg:#080a12;
  --bg-soft:#101421;
  --card:#151a29;
  --card-strong:#1c2335;
  --text:#f8fafc;
  --muted:#94a3b8;
  --accent:#ff365e;
  --accent-2:#25d0ff;
  --ring:rgba(37,208,255,.38);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(255,54,94,.25), transparent 28rem),
    radial-gradient(circle at 85% 12%, rgba(37,208,255,.18), transparent 26rem),
    linear-gradient(180deg,#090b14 0%,#080a12 45%,#05060a 100%);
  color:var(--text);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.75),transparent 70%);
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:10;
  padding:22px clamp(16px,4vw,42px);
  border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(8,10,18,.78);
  backdrop-filter:blur(20px);
  box-shadow:0 18px 50px rgba(0,0,0,.22);
}

.hero{
  display:flex;
  flex-wrap:wrap;
  gap:18px;
  align-items:flex-end;
  justify-content:space-between;
  max-width:1180px;
  margin:0 auto;
}

.kicker{
  display:inline-flex;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
  color:#fecdd3;
  font-size:12px;
  font-weight:800;
  letter-spacing:.16em;
  text-transform:uppercase;
}

.kicker::before{
  content:"";
  width:9px;
  height:9px;
  border-radius:999px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  box-shadow:0 0 22px var(--accent);
}

h1{
  margin:0;
  font-size:clamp(30px,6vw,58px);
  line-height:.95;
  letter-spacing:-.06em;
}

.subtitle{
  max-width:560px;
  margin:12px 0 0;
  color:var(--muted);
  font-size:15px;
}

.search-panel{
  width:min(100%,430px);
  padding:12px;
  border:1px solid rgba(255,255,255,.1);
  border-radius:24px;
  background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.04));
  box-shadow:0 20px 60px rgba(0,0,0,.28);
}

.search-wrap{
  position:relative;
}

.search-icon{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  pointer-events:none;
}

input{
  width:100%;
  padding:15px 46px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  outline:none;
  background:rgba(5,7,12,.78);
  color:var(--text);
  font-size:15px;
  transition:border-color .2s,box-shadow .2s,background .2s;
}

input:focus{
  border-color:var(--accent-2);
  background:rgba(7,10,18,.96);
  box-shadow:0 0 0 5px var(--ring);
}

.clear-search{
  position:absolute;
  right:9px;
  top:50%;
  width:32px;
  height:32px;
  transform:translateY(-50%);
  border:0;
  border-radius:12px;
  background:rgba(255,255,255,.08);
  color:var(--text);
  cursor:pointer;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}

.clear-search.visible{
  opacity:1;
  pointer-events:auto;
}

.meta{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-top:10px;
  color:var(--muted);
  font-size:12px;
}

main{
  position:relative;
  max-width:1180px;
  margin:0 auto;
  padding:26px clamp(16px,4vw,42px) 42px;
}

.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

.pills{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.pill{
  border:1px solid rgba(255,255,255,.09);
  border-radius:999px;
  padding:9px 14px;
  background:rgba(255,255,255,.06);
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}

.pill strong{
  color:var(--text);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(178px,1fr));
  gap:18px;
}

/* CARD */
.card{
  position:relative;
  min-height:218px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  border-radius:26px;
  background:linear-gradient(160deg,rgba(255,255,255,.1),rgba(255,255,255,.03));
  cursor:pointer;
  isolation:isolate;
  box-shadow:0 16px 38px rgba(0,0,0,.24);
  transition:transform .22s,border-color .22s,box-shadow .22s;
}

.card::before{
  content:"";
  position:absolute;
  inset:-42% -15% auto;
  height:72%;
  background:radial-gradient(circle,var(--channel-color),transparent 64%);
  opacity:.42;
  z-index:-1;
}

.card::after{
  content:"Ver canal";
  position:absolute;
  right:14px;
  bottom:14px;
  padding:7px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  color:#e2e8f0;
  font-size:11px;
  font-weight:800;
  opacity:.78;
}

.card:hover,
.card:focus-visible{
  transform:translateY(-6px) scale(1.015);
  border-color:rgba(37,208,255,.45);
  box-shadow:0 22px 60px rgba(0,0,0,.36),0 0 0 5px rgba(37,208,255,.08);
}

.card:focus-visible{
  outline:none;
}

.card-inner{
  display:flex;
  min-height:218px;
  flex-direction:column;
  justify-content:space-between;
  padding:18px;
}

/* LOGO GRANDE */
.logo{
  display:flex;
  width:86px;
  height:86px;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.22);
  border-radius:24px;
  background:linear-gradient(145deg,var(--channel-color),rgba(255,255,255,.12));
  color:#fff;
  font-size:22px;
  font-weight:950;
  letter-spacing:-.06em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 16px 35px rgba(0,0,0,.3);
}

.name{
  max-width:135px;
  margin-top:18px;
  font-size:16px;
  font-weight:850;
  letter-spacing:-.03em;
}

.channel-id{
  margin-top:8px;
  color:var(--muted);
  font-size:12px;
}

.empty{
  display:none;
  padding:42px 18px;
  border:1px dashed rgba(255,255,255,.15);
  border-radius:26px;
  background:rgba(255,255,255,.04);
  color:var(--muted);
  text-align:center;
}

.empty.visible{
  display:block;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  z-index:20;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(2,4,10,.86);
  backdrop-filter:blur(16px);
}

.modal-content{
  position:relative;
  width:min(1100px,94vw);
  height:min(680px,82vh);
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;
  background:#000;
  box-shadow:0 32px 100px rgba(0,0,0,.62);
}

iframe{
  width:100%;
  height:100%;
  border:0;
}

.close{
  position:absolute;
  top:14px;
  right:14px;
  z-index:2;
  border:1px solid rgba(255,255,255,.14);
  border-radius:14px;
  background:rgba(255,54,94,.95);
  color:#fff;
  padding:9px 12px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 12px 28px rgba(255,54,94,.3);
}

@media (max-width:640px){
  header{
    padding-top:18px;
  }

  .hero{
    align-items:stretch;
  }

  .search-panel{
    width:100%;
  }

  .grid{
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
  }

  .card,
  .card-inner{
    min-height:190px;
  }

  .logo{
    width:72px;
    height:72px;
    border-radius:20px;
    font-size:18px;
  }
}
</style>
</head>

<body>

<header>
  <div class="hero">
    <div>
      <div class="kicker">TV en directo</div>
      <h1>IPTV España</h1>
      <p class="subtitle">Elige tu canal favorito con una interfaz más limpia, rápida y pensada para móvil.</p>
    </div>

    <section class="search-panel" aria-label="Búsqueda de canales">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input id="search" type="search" placeholder="Buscar canal, liga o plataforma..." autocomplete="off">
        <button class="clear-search" id="clearSearch" type="button" aria-label="Limpiar búsqueda">×</button>
      </div>
      <div class="meta">
        <span id="resultCount">0 canales</span>
        <span>Click para reproducir</span>
      </div>
    </section>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="pills" aria-label="Resumen de canales">
      <span class="pill"><strong>DAZN</strong> y deportes</span>
      <span class="pill"><strong>Movistar</strong> premium</span>
    </div>
  </div>

  <div class="empty" id="emptyState">
    No se han encontrado canales. Prueba con “DAZN”, “Movistar” o “Liga”.
  </div>
  <div class="grid" id="grid"></div>
</main>

<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Reproductor IPTV">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">Cerrar</button>
    <iframe id="player" title="Reproductor del canal" allowfullscreen></iframe>
  </div>
</div>

<script>

/* =========================
   🇪🇸 CANALES ESPAÑA
   ========================= */
const channels = [
{ id:230, name:"DAZN 1 UK", color:"#111" },
{ id:426, name:"DAZN 1 Bar DE", color:"#111" },
{ id:427, name:"DAZN 2 Bar DE", color:"#111" },
{ id:445, name:"DAZN 1 Spain", color:"#111" },
{ id:446, name:"DAZN 2 Spain", color:"#111" },
{ id:447, name:"DAZN 3 Spain", color:"#111" },
{ id:448, name:"DAZN 4 Spain", color:"#111" },
{ id:537, name:"DAZN F1 ES", color:"#e10600" },
{ id:538, name:"DAZN LaLiga", color:"#00a859" },

{ id:84, name:"Movistar LaLiga", color:"#00a3e0" },
{ id:435, name:"Movistar Champions", color:"#0033a0" },
{ id:436, name:"Movistar Deportes", color:"#222" },
{ id:438, name:"Movistar Deportes 2", color:"#222" },
{ id:526, name:"Movistar Deportes 3", color:"#222" },
{ id:527, name:"Movistar Deportes 4", color:"#222" },
{ id:528, name:"Movistar Golf", color:"#0a6b3a" },
{ id:437, name:"Movistar Supercopa", color:"#e50914" }
];

function initials(name){
  return name
    .split(" ")
    .filter(Boolean)
    .slice(0,2)
    .map(word => word[0])
    .join("")
    .toUpperCase();
}

/* RENDER */
const grid = document.getElementById("grid");
const search = document.getElementById("search");
const clearSearch = document.getElementById("clearSearch");
const resultCount = document.getElementById("resultCount");
const emptyState = document.getElementById("emptyState");
const modal = document.getElementById("modal");
const player = document.getElementById("player");

function render(filter=""){
  const normalizedFilter = filter.trim().toLowerCase();
  const visibleChannels = channels.filter(c => c.name.toLowerCase().includes(normalizedFilter));

  grid.innerHTML="";
  emptyState.classList.toggle("visible", visibleChannels.length === 0);
  resultCount.textContent = `${visibleChannels.length} ${visibleChannels.length === 1 ? "canal" : "canales"}`;
  clearSearch.classList.toggle("visible", normalizedFilter.length > 0);

  visibleChannels.forEach(c=>{
    const div=document.createElement("button");
    div.className="card";
    div.type="button";
    div.style.setProperty("--channel-color", c.color);
    div.setAttribute("aria-label", `Abrir ${c.name}`);

    div.innerHTML=`
      <div class="card-inner">
        <div>
          <div class="logo">${initials(c.name)}</div>
          <div class="name">${c.name}</div>
          <div class="channel-id">Stream #${c.id}</div>
        </div>
      </div>
    `;

    div.onclick=()=>{
      player.src=`https://dlstreams.com/stream/stream-${c.id}.php`;
      modal.style.display="flex";
    };

    grid.appendChild(div);
  });
}

/* SEARCH */
search.addEventListener("input",e=>{
  render(e.target.value);
});

clearSearch.addEventListener("click",()=>{
  search.value="";
  search.focus();
  render();
});

/* MODAL */
function closeModal(){
  modal.style.display="none";
  player.src="";
}

window.onclick=e=>{
  if(e.target===modal) closeModal();
};

window.addEventListener("keydown",e=>{
  if(e.key === "Escape") closeModal();
});

render();

</script>

</body>
</html>
