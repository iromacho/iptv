<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="IPTV gratis sin registro con buscador y reproductor de canales.">
<title>IPTV Gratis | Canales en directo</title>
<style>
:root{
  --bg:#0f1117;
  --panel:#171a22;
  --panel-soft:#1f2330;
  --text:#f5f7fb;
  --muted:#9ca3af;
  --brand:#e11d48;
  --brand-dark:#be123c;
  --line:#2b3040;
  --ok:#22c55e;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(15,17,23,.96);
  border-bottom:1px solid var(--line);
}
.header-inner{
  width:min(1120px,calc(100% - 28px));
  margin:auto;
  padding:18px 0;
  display:grid;
  gap:14px;
}
.brand-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
h1{
  margin:0;
  font-size:clamp(24px,4vw,36px);
  letter-spacing:-.6px;
}
.free-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(34,197,94,.12);
  color:#86efac;
  border:1px solid rgba(34,197,94,.35);
  font-weight:700;
  white-space:nowrap;
}
.subtitle{
  margin:0;
  color:var(--muted);
  line-height:1.5;
}
.toolbar{
  display:flex;
  gap:10px;
  align-items:center;
}
.search{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--text);
  outline:none;
  font-size:16px;
}
.search:focus{border-color:var(--brand)}
main{
  width:min(1120px,calc(100% - 28px));
  margin:auto;
  padding:24px 0 40px;
}
.info-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:18px;
  color:var(--muted);
  font-size:14px;
}
.info-pill{
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--panel);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:14px;
}
.card{
  min-height:150px;
  padding:16px;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--panel);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:14px;
  cursor:pointer;
  transition:transform .16s ease,border-color .16s ease,background .16s ease;
}
.card:hover,.card:focus{
  transform:translateY(-3px);
  border-color:var(--brand);
  background:var(--panel-soft);
  outline:none;
}
.logo{
  width:54px;
  height:54px;
  border-radius:14px;
  display:grid;
  place-items:center;
  color:white;
  font-weight:800;
  font-size:13px;
}
.channel-name{
  margin:0;
  font-size:16px;
  line-height:1.25;
}
.watch-text{
  color:#fda4af;
  font-size:13px;
  font-weight:700;
}
.empty{
  display:none;
  margin-top:22px;
  padding:22px;
  border:1px dashed var(--line);
  border-radius:16px;
  text-align:center;
  color:var(--muted);
}
.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(0,0,0,.82);
  z-index:30;
}
.modal.open{display:flex}
.player-box{
  width:min(1100px,100%);
  height:min(70vh,680px);
  background:#000;
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--line);
  box-shadow:0 24px 70px rgba(0,0,0,.5);
}
.player-head{
  height:52px;
  padding:0 12px 0 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  background:var(--panel);
  border-bottom:1px solid var(--line);
}
.player-title{
  margin:0;
  font-size:16px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.close{
  border:0;
  border-radius:10px;
  padding:9px 12px;
  background:var(--brand);
  color:white;
  cursor:pointer;
  font-weight:700;
}
.close:hover{background:var(--brand-dark)}
iframe{
  width:100%;
  height:calc(100% - 52px);
  border:0;
  background:#000;
}
footer{
  width:min(1120px,calc(100% - 28px));
  margin:auto;
  padding:0 0 24px;
  color:var(--muted);
  font-size:13px;
}
@media (max-width:640px){
  .brand-row{align-items:flex-start;flex-direction:column}
  .free-badge{white-space:normal}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .player-box{height:78vh}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand-row">
      <div>
        <h1>IPTV Gratis</h1>
        <p class="subtitle">Canales en directo, sin registro y con buscador rápido.</p>
      </div>
      <span class="free-badge">● Gratis · Sin cuenta</span>
    </div>
    <div class="toolbar">
      <input class="search" id="search" type="search" placeholder="Buscar canal..." autocomplete="off">
    </div>
  </div>
</header>

<main>
  <div class="info-row">
    <span class="info-pill" id="channelCount">0 canales</span>
    <span class="info-pill">Pulsa un canal para verlo</span>
    <span class="info-pill">Sin pagos ni registro</span>
  </div>
  <section class="grid" id="grid" aria-label="Lista de canales"></section>
  <div class="empty" id="empty">No hay canales con ese nombre.</div>
</main>

<div class="modal" id="modal" aria-hidden="true">
  <div class="player-box" role="dialog" aria-label="Reproductor de canal">
    <div class="player-head">
      <h2 class="player-title" id="playerTitle">Canal</h2>
      <button class="close" id="closeBtn" type="button">Cerrar</button>
    </div>
    <iframe id="player" allowfullscreen title="Reproductor IPTV"></iframe>
  </div>
</div>

<footer>
  Servicio gratuito sin registro. Usa solo canales y contenidos con derechos o autorización de emisión.
</footer>

<script>
const channels = [
  {id:230, name:"DAZN 1 UK", color:"#111827"},
  {id:426, name:"DAZN 1 Bar DE", color:"#111827"},
  {id:427, name:"DAZN 2 Bar DE", color:"#111827"},
  {id:445, name:"DAZN 1 Spain", color:"#111827"},
  {id:446, name:"DAZN 2 Spain", color:"#111827"},
  {id:447, name:"DAZN 3 Spain", color:"#111827"},
  {id:448, name:"DAZN 4 Spain", color:"#111827"},
  {id:537, name:"DAZN F1 ES", color:"#e10600"},
  {id:538, name:"DAZN LaLiga", color:"#00a859"},
  {id:84, name:"Movistar LaLiga", color:"#00a3e0"},
  {id:435, name:"Movistar Champions", color:"#0033a0"},
  {id:436, name:"Movistar Deportes", color:"#222222"},
  {id:438, name:"Movistar Deportes 2", color:"#222222"},
  {id:526, name:"Movistar Deportes 3", color:"#222222"},
  {id:527, name:"Movistar Deportes 4", color:"#222222"},
  {id:528, name:"Movistar Golf", color:"#0a6b3a"},
  {id:437, name:"Movistar Supercopa", color:"#e11d48"}
];

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const modal = document.getElementById("modal");
const player = document.getElementById("player");
const playerTitle = document.getElementById("playerTitle");
const closeBtn = document.getElementById("closeBtn");
const empty = document.getElementById("empty");
const channelCount = document.getElementById("channelCount");

function initials(name){
  return name.split(" ").slice(0,2).map(word => word[0]).join("").toUpperCase();
}

function renderChannels(filter = ""){
  const query = filter.trim().toLowerCase();
  const visibleChannels = channels.filter(channel => channel.name.toLowerCase().includes(query));

  grid.innerHTML = visibleChannels.map(channel => `
    <article class="card" tabindex="0" data-id="${channel.id}" data-name="${channel.name}">
      <div class="logo" style="background:${channel.color}">${initials(channel.name)}</div>
      <div>
        <h2 class="channel-name">${channel.name}</h2>
        <span class="watch-text">Ver ahora</span>
      </div>
    </article>
  `).join("");

  channelCount.textContent = `${visibleChannels.length} canal${visibleChannels.length === 1 ? "" : "es"}`;
  empty.style.display = visibleChannels.length ? "none" : "block";
}

function openChannel(id, name){
  playerTitle.textContent = name;
  player.src = `https://dlstreams.com/stream/stream-${id}.php`;
  modal.classList.add("open");
  modal.setAttribute("aria-hidden","false");
}

function closeModal(){
  modal.classList.remove("open");
  modal.setAttribute("aria-hidden","true");
  player.src = "";
}

grid.addEventListener("click", event => {
  const card = event.target.closest(".card");
  if(!card) return;
  openChannel(card.dataset.id, card.dataset.name);
});

grid.addEventListener("keydown", event => {
  if(event.key !== "Enter" && event.key !== " ") return;
  const card = event.target.closest(".card");
  if(!card) return;
  event.preventDefault();
  openChannel(card.dataset.id, card.dataset.name);
});

search.addEventListener("input", event => renderChannels(event.target.value));
closeBtn.addEventListener("click", closeModal);
modal.addEventListener("click", event => {
  if(event.target === modal) closeModal();
});
document.addEventListener("keydown", event => {
  if(event.key === "Escape") closeModal();
});

renderChannels();
</script>
</body>
</html>
